<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>CSS Lists</h1>
    </header>
    <main>
      <article>
        <h2>Ordered Lists</h2>
        <ol start="5" reversed>
          <li>Item One</li>
          <li value="26">Item Two</li>
          <li>Item Three</li>
        </ol>
      </article>
      <article>
        <h2>Unordered Lists</h2>
        <ul>
          <li>Item One</li>
          <li>Item Two</li>
          <li>Item Three</li>
        </ul>
      </article>
    </main>
  </body>
</html>
