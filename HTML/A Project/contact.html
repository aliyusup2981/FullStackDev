<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Muhammad Ali Yusup" />
    <meta name="description" content="HTML Project" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header>
      <h1>Contact Us</h1>
      <nav>
        <ul>
          <li>
            <a href="HTML-Project.html">Home</a>
          </li>
          <li>
            <a href="HTML-Project.html#menu">Our Menu</a>
          </li>
          <li>
            <a href="hours.html#operating">Store Operating</a>
          </li>
          <li>
            <a href="contact.html">Contact Us</a>
          </li>
        </ul>
      </nav>
      <figure>
        <img src="img/tacos_close_up_400x260.png" alt="Little Taco Shop Tacos" title="We love tacos" width="400" height="260" />
        <figcaption>Little Taco Shop Tacos</figcaption>
      </figure>
    </header>
    <hr />
    <main>
      <article id="contact">
        <section>
          <h2>Contact Information</h2>
          <p>Feel free to contact us with any questions or concerns.</p>
          <address>
            <p>
              <strong>Little Taco Shop</strong><br />
              123 Taco Street<br />
              Taco Town, TA 12345<br />
              <a href="tel:+1234567890">123-456-7890</a>
            </p>
          </address>
        </section>
      </article>
      <hr />
      <article id="feedback">
        <section>
          <form action="">
            <fieldset>
              <legend>Feedback Form</legend>
              <p>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter Your Name" required />
              </p>
              <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter Your Email" required />
              </p>
              <p>
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter Your Number" required />
              </p>
              <p>
                <label for="comments">Comments:</label>
                <br />
                <textarea id="comments" name="comments" cols="30" rows="10" placeholder="Type Your Message Here" required></textarea>
              </p>
            </fieldset>
            <button type="submit">Send</button>
            <button type="reset">Clear</button>
          </form>
        </section>
      </article>
      <a href="#">Back to Top</a>
    </main>
    <hr />
    <footer>
      <p>Copyright &copy; Muhammad Ali Yusup</p>
    </footer>
  </body>
</html>
